name: Build and Push Docker Image to Bunny.net

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Bunny Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.bunnycdn.com
          username: ${{ secrets.lukely }}
          password: ${{ secrets.a06aaf6f-e4fe-44d3-b34f-737929e658923be2d3ae-2fde-42c9-aad1-451784c43544 }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            cr.bunnycdn.com/${{ secrets.lukely }}/my-app:latest
            cr.bunnycdn.com/${{ secrets.lukely }}/my-app:${{ github.sha }}

      - name: Image pushed successfully
        run: |
          echo "✅ Docker image pushed to Bunny.net Container Registry"
          echo "Image: cr.bunnycdn.com/${{ secrets.lukely }}/my-app:latest"
